# =============================================================================
# CareerMatch AI - Streamlit native theming
# =============================================================================
# Streamlit picks up this theme automatically. It controls the colors of
# native widgets (buttons, sliders, sidebar) before our custom CSS runs.
#
# We default to the LinkedIn-inspired dark palette. When the user flips the
# theme toggle in the sidebar, our CSS overrides take care of the rest by
# setting `data-theme="light"` on the root element.
# =============================================================================

[theme]
base = "dark"
primaryColor = "#0077B5"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#f0f6fc"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"
showSidebarNavigation = false

[server]
enableStaticServing = true
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
